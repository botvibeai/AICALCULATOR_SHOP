<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="neon-magenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc" />
      <stop offset="50%" stop-color="#bd00ff" />
      <stop offset="100%" stop-color="#7a00ff" />
    </linearGradient>
    
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#0066ff" />
    </linearGradient>

    <linearGradient id="neon-purple-blue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0099" />
      <stop offset="60%" stop-color="#8c00ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- BACKGROUND LAYER SHADOW -->
  <path d="M 38 15 L 12 85 H 24 L 38 48 L 41 48 L 56 85 H 68 Z" fill="#090a12" opacity="0.9" />

  <!-- STYLIZED LETTER 'A' (Neon Magenta & Purple Glow) -->
  <path d="M 38 14 L 10 82 H 24 L 38 45 L 53 82 H 67 Z" fill="none" stroke="url(#neon-magenta)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Inside accent overlay for 'A' -->
  <path d="M 38 24 L 18 73 H 26" stroke="#ff00cc" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />

  <!-- INTERLOCKING LETTER 'C' (Magenta with a sweeping loop to Blue) -->
  <path d="M 68 46 C 45 46, 34 58, 34 71 C 34 84, 45 92, 68 92 C 78 92, 85 86, 85 86 L 76 76 C 76 76, 73 80, 68 80 C 56 80, 50 75, 50 71 C 50 67, 56 61, 68 61 C 73 61, 76 65, 76 65 L 85 55 C 85 55, 78 46, 68 46 Z" fill="none" stroke="url(#neon-purple-blue)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />

  <!-- STYLIZED LETTER 'i' (Neon Blue baraligned perfectly inside the Intersect) -->
  <rect x="64" y="36" width="6" height="38" rx="3" fill="url(#neon-blue)" stroke="#00ffff" stroke-width="1.5" stroke-linejoin="round" />
  
  <!-- Glowing dot for 'i' -->
  <circle cx="67" cy="18" r="4.5" fill="#00ffff" filter="url(#neon-glow)" />
</svg>
